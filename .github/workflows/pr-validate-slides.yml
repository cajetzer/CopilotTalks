name: Validate Slide Builds (PR)

on:
  pull_request:
    paths:
      - "slides/**"
      - "tech-talks/**"

permissions:
  contents: read

concurrency:
  group: pr-slides-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build Changed Slides
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed slides
        id: changes
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SLIDES_TECH_TALKS_DIR="slides/tech-talks"

          echo "🔍 Comparing $BASE_SHA...$HEAD_SHA"

          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- slides/ tech-talks/)

          # Check if shared files changed (require full rebuild)
          SHARED_PATTERNS="slides/package\.json|slides/package-lock\.json|slides/style\.css|slides/global-top\.vue|slides/global-bottom\.vue|slides/layouts/|slides/components/|slides/setup/"
          if echo "$CHANGED_FILES" | grep -qE "$SHARED_PATTERNS"; then
            echo "🔄 Shared files changed — building ALL slides"
            echo "full_rebuild=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Extract changed slide .md files
          CHANGED_SLIDES=$(echo "$CHANGED_FILES" | grep -E "^slides/(workshop|tech-talks|exec-talks)/.*\.md$" | sed 's#^slides/##' || echo "")

          # Detect tech-talk updates that must update matching slides
          CHANGED_TECH_TALKS=$(echo "$CHANGED_FILES" \
            | grep -E "^tech-talks/[^/]+/" \
            | grep -v "^tech-talks/archive/" \
            | cut -d/ -f2 \
            | sort -u || echo "")

          if [ -n "$CHANGED_TECH_TALKS" ]; then
            echo "📖 Tech talk updates detected:"
            echo "$CHANGED_TECH_TALKS"

            # Every updated tech-talk must have a corresponding slide update to keep decks in sync.
            # CHANGED_TECH_TALK_SLIDES contains slide basenames (e.g., copilot-cli),
            # derived from slides/tech-talks/copilot-cli.md paths.
            # Assumes tech-talk folder names map to slides/tech-talks/<name>.md
            # (e.g., tech-talks/copilot-cli/ in repo root -> slides/tech-talks/copilot-cli.md).
            # Archived tech-talks are exempt (filtered above).
            CHANGED_TECH_TALK_SLIDES=$(echo "$CHANGED_SLIDES" \
              | grep -E "^tech-talks/[^/]+\.md$" \
              | sed 's#^tech-talks/##' \
              | sed 's/\.md$//' \
              | sort -u || echo "")

            MISSING_SLIDES=()
            while IFS= read -r TALK; do
              if [ -n "$TALK" ]; then
                EXPECTED_SLIDE="${SLIDES_TECH_TALKS_DIR}/${TALK}.md"
                EXPECTED_SLIDE_PATH="${GITHUB_WORKSPACE}/${EXPECTED_SLIDE}"
                if [ ! -f "$EXPECTED_SLIDE_PATH" ]; then
                  MISSING_SLIDES+=("$EXPECTED_SLIDE")
                # Slide exists but wasn't updated alongside the tech-talk.
                elif ! echo "$CHANGED_TECH_TALK_SLIDES" | grep -Fqx "$TALK"; then
                  MISSING_SLIDES+=("$EXPECTED_SLIDE")
                fi
              fi
            done <<< "$CHANGED_TECH_TALKS"

            if [ ${#MISSING_SLIDES[@]} -gt 0 ]; then
              echo "❌ The following tech-talks require corresponding slide updates:"
              printf '%s\n' "${MISSING_SLIDES[@]}"
              exit 1
            fi
          fi

          if [ -z "$CHANGED_SLIDES" ]; then
            echo "📭 No slide .md files changed (may be non-slide assets)"
            echo "full_rebuild=false" >> $GITHUB_OUTPUT
            echo "changed_slides=" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
          else
            COUNT=$(echo "$CHANGED_SLIDES" | wc -l)
            echo "📝 ${COUNT} changed slide(s):"
            echo "$CHANGED_SLIDES"
            echo "full_rebuild=false" >> $GITHUB_OUTPUT
            echo "count=${COUNT}" >> $GITHUB_OUTPUT
            echo "changed_slides<<EOF" >> $GITHUB_OUTPUT
            echo "$CHANGED_SLIDES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.changes.outputs.changed_slides != '' || steps.changes.outputs.full_rebuild == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Install dependencies
        if: steps.changes.outputs.changed_slides != '' || steps.changes.outputs.full_rebuild == 'true'
        working-directory: ./slides
        run: npm install

      - name: Install Playwright browsers
        if: steps.changes.outputs.changed_slides != '' || steps.changes.outputs.full_rebuild == 'true'
        working-directory: ./slides
        run: npx playwright install chromium --with-deps

      - name: Build changed slides
        if: steps.changes.outputs.full_rebuild != 'true' && steps.changes.outputs.changed_slides != ''
        working-directory: ./slides
        run: |
          echo "🚀 Building ${{ steps.changes.outputs.count }} changed slide(s)..."
          mkdir -p dist/workshop dist/tech-talks dist/exec-talks

          FAILED=0
          BUILT=0

          while IFS= read -r SLIDE_FILE; do
            if [ -n "$SLIDE_FILE" ] && [ -f "$SLIDE_FILE" ]; then
              CATEGORY=$(dirname "$SLIDE_FILE")
              BASENAME=$(basename "$SLIDE_FILE" .md)

              printf "🔨 %s/%s... " "$CATEGORY" "$BASENAME"

              if npx @slidev/cli build "$SLIDE_FILE" \
                --base "/CopilotTalks/${CATEGORY}/${BASENAME}/" \
                --out "$(pwd)/dist/${CATEGORY}/${BASENAME}" 2>&1; then
                echo "✅"
                BUILT=$((BUILT + 1))
              else
                echo "❌ FAILED"
                FAILED=$((FAILED + 1))
              fi
            fi
          done <<< "${{ steps.changes.outputs.changed_slides }}"

          echo ""
          echo "📊 Results: ${BUILT} built, ${FAILED} failed"

          if [ $FAILED -gt 0 ]; then
            echo "❌ ${FAILED} slide(s) failed to build"
            exit 1
          fi

      - name: Build all slides (shared files changed)
        if: steps.changes.outputs.full_rebuild == 'true'
        working-directory: ./slides
        run: |
          echo "🚀 Shared files changed — building all slides..."
          bash scripts/build-all.sh

      - name: Skip notification
        if: steps.changes.outputs.changed_slides == '' && steps.changes.outputs.full_rebuild != 'true'
        run: echo "✅ No slide content changed — nothing to validate"
