# exec.recipe.yml — executive talk generation guidance
#
# Guides slide generation from exec-talks/<topic>/README.md.
# Use this file to name and order sections, set the slide budget per section,
# and surface authoring priorities the generator should follow.
# Complex narrative content belongs in README.md; structural editorial
# intent belongs here.
#
# Exec talks are decision-making decks. Every section must earn its place
# by advancing a business case, framing a risk, or driving a leadership action.

version: 1

deck:
  title: "[Executive Briefing Title]"
  subtitle: "[Strategic Framing or Guiding Question]"
  tagline: "[One-line promise: what leaders will leave knowing or deciding]"

  # arcToc: short → chain displayed on the overview slide. One line, ≤ 80 chars.
  # Use the "The X" naming pattern common in exec-talks.
  arcToc: "[The Shift] → [The System] → [The Stakes] → [The Decision]"

  # arcNarrative: prose rationale explaining WHY the sections are ordered this way —
  # what each section establishes for the executive audience, where credibility peaks,
  # and what drives the closing action. Used by the generator as authoring guidance;
  # never displayed on a slide.
  arcNarrative: >
    [Explain the sequencing logic for an executive audience: what each section establishes,
    where the "this changes everything" moment lands, how the talk builds to a clear
    recommended action, and why alternatives were rejected.]

  # Ordered list of the section names (must match sectionModes keys below).
  # Max 4 sections — exec talks are tighter than tech talks.
  # These become the overview slide entries and section opener titles.
  sectionOrder:
    - "[Section 1 Name]"
    - "[Section 2 Name]"
    - "[Section 3 Name]"
    - "[Section 4 Name]"

  # Per-section editorial guidance for the slide generator.
  sectionModes:
    "[Section 1 Name]":
      # Slide budget hint: high = 4–5 slides, medium = 2–3, medium-low = 1–2
      emphasis: medium
      # note: authoring priority — what must land, what to cut, what action or insight the
      # executive must leave with. Be specific. Avoid implementation details.
      note: >
        [Describe what the generator must prioritize. Name the single most important business
        implication, what to cut, and any structural constraint (e.g., "lead with the cost
        number — one slide with the metric, then one operating model diagram").]
    "[Section 2 Name]":
      emphasis: high
      note: >
        [The centerpiece moment for executive credibility — a validated metric, a risk frame,
        or a strategic differentiator that earns attention. Name it explicitly.]
    "[Section 3 Name]":
      emphasis: high
      note: >
        [The urgency driver — why this matters now, what the cost of delay is, or what
        the competitive/operational consequence is. Must create momentum toward the closing.]
    "[Section 4 Name]":
      emphasis: medium
      note: >
        [The action close — what leadership must authorize, invest in, or decide. Should
        reference 2–3 concrete next steps. Tie back to the opening frame.]

  # Optional: slide files to import immediately after the TitleSlide.
  # Each entry becomes a `src:` import block in the generated deck.
  # Leave empty [] if the talk has no preamble imports.
  preamble: []

  # Optional: slide files to append after the final slide.
  # Each entry becomes a `src:` import block at the end of the generated deck.
  # Leave empty [] if the talk has no appendix imports.
  appendix: []

  # 3–5 high-signal moments the generator must surface in the deck.
  # Used for: key stat slides, business case callouts, closing action cards.
  # Write each as a complete sentence with a quantified metric where possible.
  # Avoid implementation details — frame from business impact or risk.
  highlightMoments:
    - "[Most compelling business metric or competitive framing — with a number]"
    - "[Key risk or cost-of-inaction insight — quantified if possible]"
    - "[Strategic differentiator or operating model implication — concrete]"
    - "[Optional: fourth moment if warranted — must earn its place]"
    - "[Optional: fifth moment if warranted — must earn its place]"
