# deck.recipe.yml — executive talk generation guidance
#
# Guides slide generation from tech-talks/exec-economics/README.md.
# Generated by 3-agent collaborative council + orchestrator synthesis (2026-04-24).
# Overwrite this file (do not patch) on next recipe review.

version: 1

deck:
  title: "The Agentic Economics: Making the Business Case"
  subtitle: "The ROI Framework for Agentic AI Adoption"
  tagline: "What it takes to turn the $2/hour opportunity into P&L reality"

  # arcToc: single line ≤ 80 chars — displayed on the overview slide
  arcToc: "Arbitrage → Capture Problem → Profitable Wedge → Leadership Calculation"

  preamble:
    - src: ./exec-spine.md

  # arcNarrative: prose rationale for sequencing — used by the generator as authoring
  # guidance; never displayed on a slide
  arcNarrative: >
    Open by reframing the economics of engineering labor — the $5/hr agent vs $130/hr human is the
    number that stops the room and sets the entire frame. Establish the three-bucket work spectrum
    as a decision lens, then surface the DORA 90%/24% paradox as the transition into the credibility
    crisis. Section 2 is the section that earns trust: most organizations have approved AI pilots and
    seen nothing in their P&L, and McKinsey's 5% material-ROI stat and the METR perception-reality
    gap (devs believed 20% faster; independently measured 19% slower) explain exactly why. This is
    "flying blind AND confident" — the five barriers all collapse to one diagnosis: no observability
    infrastructure. IBM shadow AI data lands here as proof that governance pays for itself, not as a
    compliance warning. Section 3 grounds theory in one concrete proof point — the issue lifecycle
    pattern — a single workflow with a measurable 3.6-day payback that demonstrates the path from
    arbitrage to actual P&L impact. Section 4 closes with the honest investment decision: Year 1 is
    negative, Year 2 turns positive, 240% 3-year ROI is the payoff — but only if executives fund
    instrumentation and governance before agents. The arc answers the four questions a CXO has: Why
    should I care? Why hasn't it worked? What does the first win look like? What do I approve Monday?

  # Ordered list of section names — must match sectionModes keys below.
  # Max 4 sections. These become overview slide entries and section opener titles.
  sectionOrder:
    - "The Labor Arbitrage Opportunity"
    - "The Capture Problem"
    - "Quick Wins Economics: The Issue Lifecycle Pattern"
    - "The Leadership Calculation"

  # Per-section editorial guidance for the slide generator.
  sectionModes:
    "The Labor Arbitrage Opportunity":
      # high = 4–5 slides, medium = 2–3, medium-low = 1–2
      emphasis: medium
      note: >
        Lead with the $5/hr agent vs $130/hr senior engineer side-by-side — this is the only number
        that needs to land in this section. Establish the 3-bucket work spectrum (high-value /
        automatable / hybrid) as a strategic decision lens, not a cost table. Surface the DORA
        90%/24% paradox (90% of orgs adopt AI, only 24% trust outputs) as the transition beat into
        Section 2. Do NOT drill into tier pricing, offshore comparisons, or per-category savings
        math — that level of detail belongs in implementation briefs, not this room.

    "The Capture Problem":
      emphasis: high
      note: >
        AUDIENCE POSTURE: Skeptical — AI hasn't shown up in the P&L; tired of being sold hype.
        Open hard with McKinsey QuantumBlack 2024 as VALIDATION, not warning: only 5% of AI pilots
        deliver material P&L improvement — frame as "you were right to be cautious, and here is
        exactly why." Then follow with METR RCT 2025: developers self-reported 20% productivity gain;
        independently measured 19% slower on complex tasks. Frame as "flying blind AND confident" —
        the perception gap is the tell for every org that approved pilots and never saw the savings.
        Name the five barriers as one diagnosis: no observability infrastructure. Include IBM shadow
        AI data here as governance credibility evidence (20% of 2025 breaches from shadow AI, +$670K
        per incident, $2.2M savings with AI security controls) — proof that infrastructure investment
        pays for itself in risk reduction. Close: "The gap is not the models. It is the
        infrastructure required to capture value — and that is a solvable problem."

    "Quick Wins Economics: The Issue Lifecycle Pattern":
      emphasis: high
      note: >
        The issue lifecycle is the ONE proof point — present nothing else in its place. Surface the
        3.6-day payback period and $1M annual savings figure (50-person team) as the concrete anchor.
        State the wedge principle explicitly: start where work is frequent, measurable, and
        approval-light. The self-funding principle matters — quick wins generate budget for the larger
        transformation. The IBM governance beat belongs here as the second beat: governance is the
        gate that protects the ROI, not a compliance tax. No tier tables, no phase tables,
        no multi-workflow breakdown. One workflow, one payback number, one principle.

    "The Leadership Calculation":
      emphasis: high
      note: >
        Lead with the J-curve honestly — Year 1 approximately -$425K, Year 2 turning positive,
        240% verified 3-year ROI. CFOs respond to honest J-curves more than optimistic projections.
        Translate to exactly three leadership asks: (1) fund instrumentation and measurement
        infrastructure first; (2) mandate a governance framework before scaling agents; (3) commit
        to workflow redesign as the multiplier. End with the mandate reframe: the question is not
        whether to approve an AI pilot — it is whether to mandate measurement infrastructure.
        Do NOT present the phased rollout table or operational sequencing detail — compress to
        principle only. Close by surfacing the 3-year compounding advantage for early movers.

  # Optional appendix imports
  appendix: []

  # 4–5 high-signal moments the generator must surface in the deck.
  # Quantified, business-framed, no implementation detail.
  highlightMoments:
    - "$5/hr agent vs $130/hr senior engineer — a 20-65x fully-loaded labor cost differential that reframes the room"
    - "McKinsey QuantumBlack 2024: only 5% of AI pilots deliver material improvement to organizational P&L"
    - "METR RCT 2025: developers self-reported 20% productivity gain; independently measured 19% slower — flying blind AND confident"
    - "Issue lifecycle: 3.6-day payback period and $1M annual savings from a single automatable workflow (50-person team)"
    - "J-curve: Year 1 ~-$425K → Year 2 cumulative positive → 240% verified 3-year ROI with proper instrumentation"

# OPEN DECISION: RESOLVED — audience posture is SKEPTICAL.
# Section 2 leads with McKinsey 5% as vindication: "you were right to be cautious."
# The METR perception gap follows as the diagnostic: "here is why your pilots didn't show up in the P&L."
# Framing throughout Section 2 is validation-first, not recalibration.
