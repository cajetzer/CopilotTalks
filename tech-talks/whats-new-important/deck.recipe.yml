# deck.recipe.yml — talk generation guidance
#
# Guides slide generation from README.md. Use this file to name and order sections,
# set the slide budget per section, and surface authoring priorities the generator
# should follow. Complex narrative content belongs in README.md; structural editorial
# intent belongs here.

version: 1

deck:
  title: "GitHub Copilot: Latest Capabilities and Effective Patterns"
  subtitle: "Fleet mode, subagents, context optimization, and the GitHub Copilot App"
  tagline: "Surfaces. Features. Tokens."

  # arcToc: short → chain displayed as the TocSlide subtitle. One line, ≤ 80 chars.
  arcToc: "Surface Map → Recent Capabilities → Context Optimization → Multi-Surface Patterns"

  # arcNarrative: prose rationale explaining WHY the sections are ordered this way —
  # what each section establishes, structural decisions, and where peak engagement lands.
  # Used by the generator as authoring guidance; never displayed on a slide.
  arcNarrative: >
    The talk opens with the Copilot Surface Map (Section 1) to ground developers in what's
    now available — six distinct surfaces, each with different tool access and execution models.
    Section 1 peaks with the GitHub Copilot App, a new first-class surface. Section 2 (Recent
    Capabilities) dives into the last 4 months of maturation: fleet mode parallelism, subagent
    composition, rubber duck pattern, and skill-based context gating. This is the "what changed"
    moment. Section 3 (Context Optimization) shifts the narrative from "what features exist"
    to "how do token costs actually come down" — progressive disclosure, scope reduction via
    skills, query filtering, local validation gates, and token budgeting. Peak engagement is
    Section 3 because it answers the unspoken question: "is this more expensive or cheaper?"
    Section 4 (Multi-Surface Patterns) closes with a worked example (feature with API, migration,
    frontend components) showing how to orchestrate surfaces and patterns to deliver faster with
    fewer tokens. The arc deliberately avoids "tool features" framing — it's about observable
    efficiency gains in real work.

  # Ordered list of the section names (must match sectionModes keys below).
  # These become the TocSlide entries and SectionOpenerSlide titles.
  sectionOrder:
    - "Surface Map"
    - "Recent Capabilities"
    - "Context Optimization"
    - "Multi-Surface Patterns"

  # Per-section editorial guidance for the slide generator.
  sectionModes:
    "Surface Map":
      # Slide budget hint: high = 4–5 slides, medium = 2–3, medium-low = 1–2
      emphasis: medium
      # note: authoring priority — what must land, what to cut, what the "whoa" moment is.
      note: >
        2–3 slides. Slide 1: the 6-surface table (VS Code Chat, Agent Mode, Background Agents,
        GitHub Copilot App, GitHub.com, CLI) with columns for access mode, execution, and
        best fit. The "whoa" moment is "there are now SIX distinct surfaces and they all share
        the same instructions and MCP config." Slide 2 (optional): the GitHub Copilot App as a
        new surface — browser-native, cross-device, no terminal/MCP access, designed for remote
        work and rubber duck sessions. If tight on time, fold this into Slide 1 as a callout.

    "Recent Capabilities":
      emphasis: high
      note: >
        3–4 slides covering four matured features. Slide 1: Fleet mode + background agents
        (parallelization efficiency gain). Slide 2: Subagent composition + delegation pattern
        (scope reduction efficiency gain). Slide 3: Rubber duck pattern as a surface in GitHub
        Copilot App (new interaction model). Slide 4 (if room): Skills-based context gating
        (preventing scope creep, forcing intentionality). Lead each with a concrete token cost
        reduction or time savings. The audience should understand "why now" — what made these
        features matter in the last 4 months.

    "Context Optimization":
      emphasis: high
      note: >
        3–4 slides on token efficiency patterns. Slide 1: Progressive disclosure (Layer 1→2→3
        loading reduces baseline context by 40–60%). Slide 2: Scope reduction via skills
        (example: refactoring with real-time type checking vs. pre-reading entire codebase).
        Slide 3: Query filtering in MCP (scoped filesystem, explicit requests, vs. full
        exposure). Optional Slide 4: Token budgeting by task class (bounded fix=1–3K,
        single-module=5–10K, multi-module=15–30K). The narrative here is observable:
        "these are the patterns that lower token spend without reducing output quality."

    "Multi-Surface Patterns":
      emphasis: high
      note: >
        3–4 slides. Slide 1: Worked example — feature with API, migration, frontend (intro).
        Slides 2–3: four-phase execution (Plan on GitHub Copilot App, Implement API via
        Background Agent, Implement migration + frontend via CLI with /fleet, Code review on
        GitHub.com) with token cost and time per phase. Final slide: cost/benefit summary:
        ~26K tokens in 45 min vs. ~35K tokens in 90 min sequential. Tie back to the core
        question: "which surfaces reduce cost and improve outcomes?"

  # Optional: slide files to import immediately after the TitleSlide.
  preamble: []

  # Optional: slide files to append after the ThankYouSlide.
  appendix: []

  # 3–5 high-signal moments the generator must surface in the deck.
  # Used for: BeforeAfterSlide items, ThankYouSlide cards, WhatYouCanDoTodaySlide actions.
  highlightMoments:
    - "Six Copilot surfaces now exist. Same instructions, MCP config, and tools across all of them. Route each task type to the right surface: ~50% time savings vs. single-surface use."
    - "Fleet mode: run 3 independent tasks with ~1.5x token cost instead of 3x. Subagents cut context per task by ~40%. Progressive disclosure reduces baseline load by 40–60%."
    - "Skills gate expensive operations. Query filtering in MCP prevents accidental context loading. Local validation gates keep agents in-loop without pre-reading entire codebase."
    - "Token budgeting by task class: bounded fixes ~1–3K, single-module refactors ~5–10K, multi-module features ~15–30K. Agents signal when trending over budget instead of consuming unlimited context."
    - "GitHub Copilot App brings rubber duck pattern to first-class surface: design review, assumption checking, cross-device work — all without making code changes or needing terminal access."
