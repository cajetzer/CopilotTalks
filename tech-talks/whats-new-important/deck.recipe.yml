# deck.recipe.yml — talk generation guidance
#
# Guides slide generation from README.md. Use this file to name and order sections,
# set the slide budget per section, and surface authoring priorities the generator
# should follow. Complex narrative content belongs in README.md; structural editorial
# intent belongs here.

version: 1

deck:
  title: "GitHub Copilot: Latest Capabilities and Effective Patterns"
  subtitle: "Fleet mode, subagents, context engineering, and the GitHub Copilot App"
  tagline: "Surfaces. Features. Tokens."

  # arcToc: short → chain displayed as the TocSlide subtitle. One line, ≤ 80 chars.
  arcToc: "Surface Map → Recent Capabilities → Context Engineering → Multi-Surface Patterns"

  # arcNarrative: prose rationale explaining WHY the sections are ordered this way —
  # what each section establishes, structural decisions, and where peak engagement lands.
  # Used by the generator as authoring guidance; never displayed on a slide.
  arcNarrative: >
    The talk opens with the Copilot Surface Map (Section 1) to ground developers in what's
    now available — seven distinct surfaces, each with different tool access and execution models.
    Section 1 peaks with the GitHub Copilot App, a new first-class surface. Section 2 (Recent
    Capabilities) dives into the last 4 months of maturation: fleet mode parallelism, subagent
    composition, rubber duck pattern, skill-based context gating, VS Code agents window +
    remote sessions, terminal safety/efficiency controls, cloud agent plan-first flows, and
    Visual Studio plan agent context controls. This is the "what changed" moment. Section 3
    (Context Engineering) shifts the narrative from "what features exist"
    to "how do outcomes improve with better context management" — progressive disclosure, scope
    reduction via skills, query filtering, local validation gates, and scope budgeting. Peak
    engagement is Section 3 because it answers the unspoken question: "how do we get better
    results without adding complexity?"
    Section 4 (Multi-Surface Patterns) closes with a worked example (feature with API, migration,
    frontend components) showing how to orchestrate surfaces and patterns to deliver faster with
    clearer handoffs. The arc deliberately avoids "tool features" framing — it's about observable
    efficiency gains in real work.

  # Ordered list of the section names (must match sectionModes keys below).
  # These become the TocSlide entries and SectionOpenerSlide titles.
  sectionOrder:
    - "Surface Map"
    - "Recent Capabilities"
    - "Context Engineering"
    - "Multi-Surface Patterns"

  # Per-section editorial guidance for the slide generator.
  sectionModes:
    "Surface Map":
      # Slide budget hint: high = 4–5 slides, medium = 2–3, medium-low = 1–2
      emphasis: medium
      # note: authoring priority — what must land, what to cut, what the "whoa" moment is.
      note: >
        2–3 slides. Slide 1: the 7-surface table (VS Code Chat, Agent Mode, Background Agents,
        VS Code Agents app, GitHub Copilot App, GitHub.com, CLI) with columns for access mode,
        execution, and best fit. The "whoa" moment is "there are now SEVEN distinct surfaces and they all share
        the same instructions and MCP config." Slide 2 (optional): the GitHub Copilot App as a
        technical-preview desktop surface — integrated terminal/browser, parallel isolated
        sessions, MCP + skills support, and canvases in the right panel. If tight on time, fold
        this into Slide 1 as a callout.

    "Recent Capabilities":
      emphasis: high
      note: >
        4–5 slides covering baseline and newly matured capabilities. Keep existing anchors:
        Fleet mode + Copilot App parallel sessions + background agents, subagent composition,
        rubber duck, and skills-based context gating. Add newly matured capabilities: VS Code
        agents window with remote session continuity, terminal safety/efficiency controls,
        cloud agent plan-first/deep-research workflows, and Visual Studio plan agent context
        controls. Lead each with concrete implementation implications and review-loop impact.
        Keep progressive disclosure out of this section; cover it in Context Engineering only.
        Include an inline source-links slide in this section so each capability maps to a
        verifiable reference.

    "Context Engineering":
      emphasis: high
      note: >
        3–4 slides on context engineering patterns. Slide 1: Progressive disclosure (Layer 1→2→3
        loading to avoid broad context up front). Slide 2: Scope reduction via skills
        (example: refactoring with real-time type checking vs. pre-reading entire codebase).
        Slide 3: Query filtering in MCP (scoped filesystem, explicit requests, vs. full
        exposure). Optional Slide 4: Scope budgeting by task class (bounded fix, module refactor,
        multi-module feature). Anchor this section in intentional context design and progressive
        disclosure principles (see awesome-ai-native context engineering patterns), and include
        the reference link inline in this section.

    "Multi-Surface Patterns":
      emphasis: high
      note: >
        3–4 slides. Replace task-by-task decision trees with execution topologies. Slide 1:
        Topology A (app-centric orchestration). Slide 2: Topology B (IDE-centric implementation
        with app oversight). Slide 3: Topology C (CLI-centric runtime work). Final slide:
        surface-selection rules (start where authoritative state lives, split by dependency graph,
        keep orchestration and execution distinct, move to review surfaces early, escalate context
        only when blocked). Tie back to the core question: "which surfaces improve delivery
        quality and speed?"

  # Optional: slide files to import immediately after the TitleSlide.
  preamble: []

  # Optional: slide files to append after the ThankYouSlide.
  appendix: []

  # 3–5 high-signal moments the generator must surface in the deck.
  # Used for: BeforeAfterSlide items, ThankYouSlide cards, WhatYouCanDoTodaySlide actions.
  highlightMoments:
    - "Seven Copilot surfaces now exist. Same instructions, MCP config, and tools across all of them. Route each task type to the right surface for cleaner execution and fewer context resets."
    - "Fleet mode enables parallel independent tasks. Subagents keep context scoped. Rubber duck and skill-gated workflows keep reasoning and execution deliberately separated."
    - "New orchestration upgrades: VS Code agents window in stable preview, remote agent continuity, terminal risk/compression controls, cloud agent plan-first + deep research, and Visual Studio plan agent context controls."
    - "Progressive disclosure is a separate operating discipline: stage context by intent, structure, runtime, and validation."
    - "Scope budgeting by task class: bounded fixes, module refactors, and multi-module features should each have explicit boundaries. Split work when scope drifts."
