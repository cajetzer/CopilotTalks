# deck.recipe.yml — VS Code Latest talk guidance

version: 1

deck:
  title: "What's New in Copilot for VS Code"
  subtitle: "v1.108 – v1.115: Eight Releases of AI Innovation"
  tagline: "From assistant to autonomous agent team"
  arc: "assistant → autonomous agent → enterprise agent fleet — each section adds a capability layer, ending with trust controls"


  sectionOrder:
    - "Agent Sessions & Orchestration"
    - "Agent Customization"
    - "Claude & Anthropic Integration"
    - "Security & Trust"

  sectionModes:
    "Agent Sessions & Orchestration":
      emphasis: high
      note: >
        Lead with the four agent types and background agents with Git worktree isolation —
        this is the biggest mindset shift and earns the audience's attention for everything
        that follows.
    "Agent Customization":
      emphasis: high
      note: >
        Skills (now GA), Plugins, and org-level instructions show how teams take control
        of what agents know and can do — the "make it yours" beat.
    "Claude & Anthropic Integration":
      emphasis: medium-high
      note: >
        Thinking tokens and the Claude Agent SDK unlock a new tier of reasoning; position
        as the power-user layer for teams pushing beyond default capabilities.
    "Security & Trust":
      emphasis: medium
      note: >
        Terminal sandboxing and auto-approval rules are what allow organizations to safely
        delegate more work to autonomous agents — close with confidence, not caution.

  highlightMoments:
    - "Four agent types optimized for different tasks — Local, Background, Cloud, Claude"
    - "Autopilot mode enables fully autonomous task execution with configurable tool permissions"
    - "Background agents with Git worktree isolation enable true parallel autonomous execution"
    - "Explore subagent dedicated to research reduces Plan agent context contamination"
    - "Weekly stable releases starting v1.111 — 8 releases of AI innovation in 4 months"

# OPEN DECISION: "Chat UX & Productivity" (video in chat, Copy Final Response, Chat
# Customizations editor) is excluded from sectionOrder due to the 4-section cap.
# Consider folding its highlights into the Security & Trust closing beat if the audience
# asks about day-to-day UX polish, or elevate it to replace "Security & Trust" for
# audiences less concerned with enterprise governance.
