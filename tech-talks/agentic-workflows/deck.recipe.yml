# deck.recipe.yml — Agentic Workflows talk guidance
#
# COUNCIL VERDICT: "The Opportunity" is promoted to S1 (no 🎬 README marker) — the talk
# opens cold without it. Safe Outputs is elevated to medium-high: 1 slide against a
# security-critical argument is a structural gap that costs enterprise adoption, not
# merely a polish issue.

version: 1

deck:
  title: "GitHub Agentic Workflows"
  subtitle: "Repository Automation with AI Agents"
  tagline: "Write repository automation in natural language, execute with security-first AI agents"
  arcToc: "The Opportunity → Core Architecture → Safe Outputs → Agent Factory"

  arcNarrative: >
    The talk opens with The Opportunity to land the WHY before anything technical arrives:
    the audience must feel the friction of YAML-bound, deterministic automation that breaks
    whenever repository context demands judgment — otherwise Core Architecture sounds like a
    feature list instead of a solution. Core Architecture is the load-bearing section; the
    three-phase Markdown→compile→lock.yml pipeline is the single mental model that makes
    every downstream claim credible — without it, neither the security story nor the 100+
    pattern catalog has a foundation to stand on, so it earns the most slides and the slowest
    pace. Safe Outputs lands third as the enterprise trust unlock: the read-only AI sandbox
    plus validated safe-output handlers answer the "can I actually ship this?" objection for
    platform engineers and EMs before they hit the catalog — skipping or thinning this section
    costs the audience's confidence right before the payoff. Agent Factory closes as
    proof-of-concept made concrete: the 100+ pattern catalog validated through continuous
    production use, three rapid vignettes (issue triage, CI diagnostic, daily status) giving
    every persona an on-ramp, and a "What You Can Do Today" CTA anchored on `gh extension
    install github/gh-aw` as the cleanest possible landing strip. Peak engagement lands in
    Core Architecture (the "aha" of the lock-file reveal) with a second spike at the Factory
    vignettes; this ordering beats alternatives because it withholds the "here's what to
    build" excitement until the audience has the security and architecture confidence to
    actually believe it.

  sectionOrder:
    - "The Opportunity"
    - "Core Architecture"
    - "Safe Outputs"
    - "Agent Factory"

  sectionModes:
    "The Opportunity":
      emphasis: medium
      note: >
        Two slides maximum — no more. Open with the YAML friction contrast: intent-driven
        automation (adaptive, natural language) vs. stepwise YAML workflows (deterministic,
        imperative). The "whoa" moment is the before/after: a 30-line YAML workflow reduced
        to 8 lines of natural-language Markdown. Do not explain the compilation pipeline
        here — that belongs in Core Architecture. This section earns its place despite
        having no 🎬 README marker; without the WHY frame the talk opens cold into
        architecture diagrams for an audience that hasn't been given a reason to care.
    "Core Architecture":
      emphasis: high
      note: >
        This is the load-bearing section — teach the three-phase pipeline explicitly:
        (1) Authoring: Markdown workflow definition with frontmatter triggers, permissions,
        tools, and safe-outputs declarations; (2) Compilation: `gh aw compile` transforms
        Markdown → secure .lock.yml with agent job (read-only sandbox) + safe-output handler
        jobs (minimal write permissions); (3) Execution: sandboxed runner, structured JSON
        output, validation pipeline, audit trail. The "whoa" moment is the lock-file reveal —
        show the compiled YAML side-by-side with the Markdown source so the audience viscerally
        understands that the lock file is a generated artifact they never touch. Cover the three
        runtime environments (local/Actions/Docker) concisely — don't let environment detail
        crowd out the pipeline model. Everything downstream depends on this section; do not rush.
    "Safe Outputs":
      emphasis: medium-high
      note: >
        EXPANSION REQUIRED — currently 1 slide, must reach 2–3 before next delivery.
        This is the enterprise trust unlock and the primary skeptic-converter for platform
        engineers and EMs. Slide 1: the threat model — read-only AI sandbox produces
        structured JSON → validation pipeline (schema check, sanitization, rate limiting,
        permission check) → safe-output handler executes with minimal scoped permissions.
        The "whoa" moment is the compiler-as-policy framing: security is enforced by the
        compiler, not the author's discipline. Slide 2 (required addition): the seven Safe
        Output types matrix (Issues, PRs, Comments, Labels, Projects, Code Review, Security
        Advisories) with at least one config archetype YAML visual showing max/expires/
        title-prefix guardrails. Call out the noop pattern as the #1 runtime failure mode
        and its fix. Do not let this section be a single bullet list — it must feel like a
        security architecture review, because for platform engineers it is.
    "Agent Factory":
      emphasis: high
      note: >
        Conceptual payoff plus concrete proof in one section. Open with the Factory origin
        story (Peli de Halleux, 100+ workflows running continuously in production on
        github/gh-aw) to establish that this is validated reality, not demo-ware. Frame the
        catalog by pattern type: reactive (issue triage, PR review) → scheduled (daily status,
        dependency updates) → orchestrator (multi-agent dispatch, CI diagnostic synthesis).
        Deliver three rapid vignettes — issue triage (event-triggered, labels + comment),
        CI failure diagnostic (log analysis, creates structured issue), daily status report
        (scheduled, synthesizes activity) — to give each audience persona a concrete anchor.
        The "whoa" moment is the AgentCouncil integration: consensus mechanism for high-stakes
        decisions requiring multiple AI perspectives. Close hard into the Mental Model Shift
        ("describe outcomes, not steps") and "What You Can Do Today": `gh extension install
        github/gh-aw`, one workflow in minutes, production via GitHub Actions. Before/After
        and closing slides feed directly from this arc.

  highlightMoments:
    - "30-line YAML workflow → 8-line Markdown intent: write what you want, compile gets you what you need"
    - "Lock file is a generated artifact — the compiler enforces security, not author discipline"
    - "Read-only AI sandbox + validation pipeline: zero direct writes, every action auditable via workflow-id markers"
    - "Seven Safe Output types cover the full GitHub surface — Issues to Security Advisories — without a single unscoped write"
    - "100+ workflows running continuously in production (Peli's Agent Factory): this is validated reality, not demo-ware"

