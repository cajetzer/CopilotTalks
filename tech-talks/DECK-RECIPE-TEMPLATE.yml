# deck.recipe.yml — lightweight talk generation guidance
#
# This recipe guides slide generation from a README.md while letting the template.md
# structure and generator handle slide organization. Use this file to emphasize what
# matters most — not to control which slides appear.
#
# Keep this file minimal. Complex structure should be in README.md via <!-- 🎬 MAJOR SECTION: -->
# markers and in template.md's strategic content outline.

version: 1

# Metadata for the deck
deck:
  # Title, subtitle, tagline (e.g., from template frontmatter)
  title: "[Feature/Capability Name]"
  subtitle: "[Compelling Subtitle]"
  tagline: "[One-line promise or focus]"

  # How the opening slides frame the talk
  intro:
    mode: core-question  # core-question | opportunity

  # What to emphasize most (3-5 key points readers/audiences should remember)
  # The generator uses these to shape slide emphasis and ordering
  highlightMoments:
    - "[Most important insight or capability]"
    - "[Second key differentiator or outcome]"
    - "[Third critical point for the audience]"
