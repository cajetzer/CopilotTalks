version: 1

deck:
  title: "Building Agent Systems"
  subtitle: "Subagents, Teams, and Autonomous Execution"
  tagline: "Compose AI agents into systems that handle complex tasks, run autonomously, and improve over time"
  arcToc: "Primitive → Grammar → Autonomy → Synthesis"
  arcNarrative: >
    The talk opens with a precise diagnosis: a single agent isn't failing because it's
    unintelligent — it's failing because context is finite and the problem isn't. The answer
    is architecture, and before the audience gets mechanisms, they get grammar: four named
    patterns, a decision tree, and the vocabulary to think with. From there, composition
    isn't demonstrated abstractly — it's recognized. The audience watches the auth case and
    then hears the name for what they've been watching. By S3, the math has accumulated
    quietly: 9.7 hours returned to the EM's week, not as a promise but as a line item. S4
    closes the loop. A council deliberates. A squad executes. A decisions.md file persists —
    the architecture now governs itself. The decision tree lights up completely, and the arrow
    runs backward: council output feeds autonomous execution. The human approved the artifact.
    They didn't attend the meeting.

  sectionOrder:
    - "Subagents: The Building Block"
    - "Agent Teams: Organized Specialists"
    - "Autonomous Execution: Background Agents + Worktrees"
    - "Agent Council: When Different Models Think Differently"

  sectionModes:
    "Subagents: The Building Block":
      emphasis: medium-high
      note: >
        Establish the primitive and the grammar fast. Decision tree introduced as the talk's
        navigation spine — one branch lights per section. Vocabulary card closes the section:
        four named patterns, non-negotiable. Auth scenario planted here; audience won't know
        it matters yet. Target 3-4 slides. Resist expansion — HIGH-everywhere dilutes the
        emphasis gradient that makes S4 land.
    "Agent Teams: Organized Specialists":
      emphasis: high
      note: >
        Pattern labels from S1 are recalled by name, not re-taught. The audience recognizes
        what they're watching — composition, not introduction. Auth threading continues: the
        team takes on the case. Decision tree gains the Teams branch. Target 4 slides; the
        intellectual work was already done in S1.
    "Autonomous Execution: Background Agents + Worktrees":
      emphasis: high
      note: >
        Business case before mechanism. 9.7 hrs/week is the headline slide — the EM math
        that converts background agents from demo to budget conversation (10 tasks × 58
        minutes saved each). Auth runs unsupervised; audience doesn't see the flaw yet.
        Decision tree gains the Autonomy branch. Target 5-6 slides.
    "Agent Council: When Different Models Think Differently":
      emphasis: high
      note: >
        S4 closes the loop. Council catches the auth flaw that every prior layer missed —
        the concrete payoff for threading the case study across all four sections.
        decisions.md artifact opens on screen as the primary source: Pre-Run + Live Artifact
        pattern — no live network call, run council before the talk, zero network dependency,
        pre-recorded fallback available. Decision tree fully illuminated; feedback arrow added
        — council output feeds autonomous execution. The human approved the artifact. They
        didn't attend the meeting. Target 5 slides.

  highlightMoments:
    - "Decision tree opener (S1): audience self-selects their entry point before a single mechanism is named — the talk earns attention before it spends it"
    - "Vocabulary card (S1 close): grammar before the tour — four named patterns give the audience the words to think with for the next 45 minutes"
    - "9.7 hrs/week (S3): 10 tasks × 58 minutes saved each — the EM math that turns a demo into a budget conversation"
    - "Auth flaw caught by council (S4): the flaw threaded silently through S1–S3 surfaces only under deliberation — concrete proof that model diversity is a quality mechanism, not a preference"
    - "decisions.md artifact (S4 close): architecture governs itself; decision tree fully lit with feedback arrow — council output feeds autonomous execution, human approved the artifact and didn't attend the meeting"

# OPEN DECISION: Auth case study threading — whether threading the auth scenario across all
# 4 sections is worth the coordination cost vs. a standalone S4 demo.
# (A) Thread all 4 sections (planted S1 → progresses S2 → runs unsupervised S3 → flaw
#     caught S4): maximum narrative payoff, "caught by council" lands with full dramatic
#     weight, but requires tight slide coordination and risks feeling contrived in S1/S2.
# (B) Introduce at S3, close at S4 only: cleaner pacing, lower coordination risk, council
#     reveal still lands — audience watched the execution, council catches what they missed.
# Consequence: if threading proves awkward in rehearsal, option B is the safe fallback with
# no structural changes required to S1/S2.
