version: 1

deck:
  title: "From Issue to Pull Request"
  subtitle: "GitHub Copilot's Coding Agent in Practice"
  tagline: "What if filing an issue was the same as fixing it?"
  arc: "Hook with the delegation loop → Master the skill → Govern safely → Close confidently"


  sectionOrder:
    - "The Delegation Loop: From Issue Assignment to Draft PR"
    - "Writing Issues That Work"
    - "Trust and Configuration: Environment Setup and the Agent Firewall"
    - "The Review Workflow: From Draft PR to Merge"

  sectionModes:
    "The Delegation Loop: From Issue Assignment to Draft PR":
      emphasis: high
      note: >
        Establish the full loop end-to-end — trigger, sandbox execution, evidence bundle,
        and the separation-of-duties constraint — so every subsequent section has a
        concrete mental model to build on.

    "Writing Issues That Work":
      emphasis: high
      note: >
        The most learnable and immediately applicable skill in the talk; PR quality is
        a direct reflection of issue quality, so this section is the practical unlock
        that lets teams leave and delegate something today.

    "Trust and Configuration: Environment Setup and the Agent Firewall":
      emphasis: medium-high
      note: >
        Necessary guardrails before teams scale delegation — copilot-setup-steps.yml
        ensures consistent CI parity and the Agent Firewall provides the security model
        that makes autonomous code generation safe on sensitive repositories.

    "The Review Workflow: From Draft PR to Merge":
      emphasis: medium-high
      note: >
        Closes the loop and builds long-term confidence — evidence-bundle-first review,
        mobile PR approval, and custom review agents show that human oversight is a
        fast, structured step rather than a bottleneck.

  highlightMoments:
    - "End-to-end automation: file issue → agent PR → review → merge with human control at each gate"
    - "Separation of duties enforced by GitHub — the person who assigned the issue cannot be the PR approver"
    - "Image-based issue creation: 14-minute manual transcription becomes a 2-minute visual workflow with 95% detail capture"
    - "Mobile review loop: senior developers read the evidence bundle, invoke @review-enforcer, and approve in under 3 minutes from a phone"
    - "12 minutes total human time for a complete lodash upgrade across 23 files — the agent did the rest"

