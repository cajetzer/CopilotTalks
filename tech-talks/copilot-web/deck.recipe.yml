version: 1

deck:
  title: "From Issue to Pull Request"
  subtitle: "GitHub Copilot's Coding Agent in Practice"
  tagline: "What if filing an issue was the same as fixing it?"

  intro:
    mode: core-question

  highlightMoments:
    - End-to-end automation: file issue → agent PR → review → merge with human control at each gate
    - Separation of duties enforced by GitHub (agent cannot approve its own PR)
    - 12 minutes total human time for complete delegation workflow
    - Trust boundaries and configuration patterns for team adoption
