# deck.recipe.yml — Agentic SDLC talk guidance
#
# Updated to reflect the enriched five-level maturity model in the README.
# Implementation Roadmap is Section 5 — the talk ends on a planning frame.

version: 1

deck:
  title: Agentic SDLC
  subtitle: "Designing the SDLC Your Agents Deserve"
  tagline: >
    Five maturity levels — platform readiness, developer adoption, and
    governance that compound together

  arcToc: "Assess → Govern → Trust → Scale"
  arcNarrative: >
    One framework, five levels — each level has clear platform signals,
    adoption signals, and governance expectations. Three infrastructure
    sections deliver the blueprint. Repository topology is a critical
    infrastructure prerequisite but is woven into the Implementation
    Roadmap as Phase 1 context rather than a standalone section. A
    constraint-ladder thread runs through the arc: the bottleneck moves
    from setup → review → trust → measurement, giving each section a
    clear "here is the next wall you'll hit" transition.
  sectionOrder:
    - "Maturity Model"
    - "PR Workflows"
    - "Trust Manufacturing"
    - "Implementation Roadmap"

  sectionModes:
    "Maturity Model":
      emphasis: high
      note: >
        3 slides max. (1) L1–L5 assessment table — each level has platform
        signals, adoption signals, and governance signals; detailed criteria
        live in speaker notes. (2) L5 breakpoint — review capacity designed
        for 300 lines/day collapses at 15,000; this is the only "taxonomy"
        slide that earns its keep. (3) Instruction Hierarchy — the
        cross-cutting investment that compounds at every level (org
        instructions → repo instructions → AGENTS.md → prompt files →
        coding guidelines).
    "PR Workflows":
      emphasis: high
      note: >
        The governance pyramid inversion (22 manual gates → 4 human
        checkpoints + 90% automated) is the architectural insight leaders
        need. Open with the maturity context table so the audience sees how
        review mode shifts at each level. Constraint-ladder transition:
        "Coordination is solved; now review capacity is the bottleneck."
    "Trust Manufacturing":
      emphasis: medium-high
      note: >
        Keep 10-min CI threshold, zero-flake tolerance, attestations, and
        context-aware agent validation. Focus purely on the CI-as-trust-
        factory metaphor. Constraint-ladder transition: "Review scales; now
        you need the CI pipeline to manufacture trust at that velocity."
    "Implementation Roadmap":
      emphasis: high
      note: >
        3 slides, one per phase. Each phase shows Platform & Tooling (left)
        and Adoption & Governance (right). Phase 1 = L3 (standardized
        foundation) — include a one-paragraph call-out on repository
        topology here: the coordination tax arithmetic (3 repos × 45-min CI
        = 3 days vs monorepo 45 min) belongs in Phase 1 as the first
        infrastructure decision, not a standalone section. Phase 2 = L4
        (optimized governance). Phase 3 = L5 (autonomous + measurement).
        Instruction Hierarchy woven through all three phases. Final slide:
        "L3 is the launchpad — where repeatability, adoption, and quality
        infrastructure first compound."

  highlightMoments:
    - >
      Level 5 breakpoint: review capacity designed for 300 lines/day
      collapses at 15,000 lines/day — scarcity shifts from writing code
      to trusting it at velocity
    - >
      Coordination tax arithmetic: 3 repos × (45-min CI + 4-hr review) =
      3 days to production; monorepo makes it 45 minutes — same agent work,
      radically different wall time
    - >
      10-minute CI threshold: agents sit idle 80% of the time with 60-min
      CI, productive 95% with 8-min CI — the difference between 3
      features/day and 15
    - >
      Governance pyramid inversion: 22 manual approval gates → 4 human
      checkpoints with 90% automated enforcement — review capacity scales
      from 300 to 15,000 lines/day per reviewer
    - >
      100x throughput result: 150 features/year → 3,600 — compounding
      effect of repo topology, PR governance, and CI trust manufacturing
      working together
    - >
      Platform without adoption stalls at L3. Adoption without platform
      never reaches L5. Both must advance — and L3 is where they first
      compound into something real.
    - >
      Instruction Hierarchy as highest-leverage cross-cutting investment:
      org instructions → repo instructions → AGENTS.md → prompt files →
      coding guidelines — compounds at every level
    - >
      L3 is the launchpad: where repeatability, adoption depth, and quality
      infrastructure first compound — skip it and L5 collapses under
      its own weight

# ──────────────────────────────────────────────────────────────────────
# OPEN QUESTIONS (not blocking; resolve during slide authoring)
#
# 1. Slide budget: 4 sections — target 16–20 slides total.
#
# 2. Assessment table density: one slide may be tight for the full 5-row
#    table with platform + adoption + governance columns. Consider an
#    abbreviated table on-slide with full criteria in speaker notes.
# ──────────────────────────────────────────────────────────────────────

# ──────────────────────────────────────────────────────────────────────
# OPTIONAL / EXPERIMENTAL IDEAS (captured from council brainstorm)
#
# Cold open from failure — "Your agents can write 15 features/day. Your
# SDLC can only absorb 3." Opens with the gap, then rebuilds. Strong
# for executive-heavy rooms; test with a dry run.
#
# Constraint-ladder framing — already woven into section transition
# notes above. If it resonates in rehearsal, consider a small recurring
# visual (e.g., a bottleneck icon that moves) rather than just verbal
# transitions.
# ──────────────────────────────────────────────────────────────────────