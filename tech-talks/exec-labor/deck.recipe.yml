# deck.recipe.yml — executive talk generation guidance
#
# Guides slide generation from tech-talks/exec-labor/README.md.
# Generated by 3-agent collaborative council + orchestrator synthesis (2026-04-24).
# Overwrite this file (do not patch) on next recipe review.

version: 1

deck:
  title: "The Labor Multiplier: What Agents Actually Do"
  subtitle: "Where agent labor replaces engineering work — and what leadership must authorize to capture it"
  tagline: "AI addressed the 33%. Here is where the other 67% lives — and what it costs to leave it untouched."

  # arcToc: single line ≤ 80 chars — displayed on the overview slide
  arcToc: "The Hidden Labor Bill → The Three Leverage Zones → The Handoff Pattern → The Decision"

  # arcNarrative: prose rationale for sequencing — used by the generator as authoring
  # guidance; never displayed on a slide
  arcNarrative: >
    Section 1 validates the executive's existing AI investment with the Accenture RCT result, then
    pivots immediately to DORA's "mirror and multiplier" finding — establishing the P&L gap without
    attacking the prior decision. Section 2 collapses the nine-category SDLC taxonomy into three
    executive-readable buckets (Control, Coordination, Context), each anchored to one external,
    cited dollar figure; credibility peaks here because the evidence is verifiable and
    business-consequential. Section 3 presents the Handoff Pattern as the mechanism that actually
    captures the gain, using the developer trust data — 43% trust AI output — not as a warning but
    as the architectural reason the human review step is mandatory and what makes agent output safe
    to ship. Section 4 reduces the README's three asks to a single authorization: ratify a governed
    AI policy in a bounded, high-friction workflow, which structurally mandates the audit and funds
    the pilot as implementation mechanics of that one decision. The arc closes on a decision, not a
    recommendation — the executive leaves with one action item and a clear reason to act this quarter.

  # Ordered list of section names — must match sectionModes keys below.
  # Max 4 sections. These become overview slide entries and section opener titles.
  sectionOrder:
    - "The Hidden Labor Bill"
    - "The SDLC Labor Map"
    - "The Handoff Pattern: Preparation → Decision → Execution"
    - "The Decision: What Leadership Must Authorize This Quarter"

  # Per-section editorial guidance for the slide generator.
  sectionModes:
    "The Hidden Labor Bill":
      # high = 4–5 slides, medium = 2–3, medium-low = 1–2
      emphasis: high
      note: >
        Open with the Accenture RCT win: 84% more successful builds, 15% higher PR merge rate,
        12,000+ enterprise developers. Validate the existing AI investment before introducing the
        gap — this is an "and, not but" proposition. Then land the DORA pivot in one sentence:
        those gains are not reaching the P&L because AI amplifies what is already in place, and
        the surrounding 67% of engineering labor is untouched. Close with the McKinsey 30–33%
        code-writing finding as the structural reason the constraint has shifted downstream.
        Do NOT preview all nine SDLC categories here — that belongs in Section 2. The executive
        leaves Section 1 knowing their prior investment was right and structurally incomplete.

    "The SDLC Labor Map":
      emphasis: high
      note: >
        Generator note: draw content from README sections Discovery, Planning, Governance,
        Knowledge, and Validation — presenting them as THREE executive buckets, not five separate
        domains. CONTROL (Governance + Validation): $4.44M average breach (IBM 2025); Copilot
        Autofix cuts SQL injection from 3.7 hours to 18 minutes (12x); 4-hour compliance review
        per PR becomes 10 minutes. COORDINATION (Discovery + Planning): 50-person team spends
        18,000+ engineer-hours annually on triage and coordination; 2–4 hour investigation per
        issue compressed to minutes. CONTEXT (Knowledge): replacing one engineer costs 50–200%
        of salary; 7–8 onboarding cycles per year at 15% attrition; documentation drift
        detectable and patchable by agents. One data point per bucket — do not walk through all
        nine categories individually. Validation evidence rolls into CONTROL without being named
        separately. The executive leaves knowing exactly which three business domains are
        addressable, with a number attached to each.

    "The Handoff Pattern: Preparation → Decision → Execution":
      emphasis: high
      note: >
        Lead with the mechanism: Preparation (agent, minutes) → Decision (human, minutes,
        better-informed) → Execution (agent, with human monitoring). Present the 8–12 hours of
        human labor per task → approximately 20 minutes as the before/after. Then reframe the
        trust data as design justification, not risk disclosure: only 43% of developers trust
        AI-generated output (Stack Overflow 2024) and 30% have little or no trust (DORA 2025) —
        this is the architectural reason the human review step is mandatory, not a caveat.
        Present the 8–12 hr → 20 min compression as illustrative unless a hard external citation
        is available. Close with DORA's 7 foundational capabilities as a one-slide leadership
        checklist: "what determines whether this produces compounding returns or gains lost to
        downstream chaos." Cut the ROI metric tables and pipeline diagrams. The executive leaves
        with mechanism credibility and an org-readiness checklist.

    "The Decision: What Leadership Must Authorize This Quarter":
      emphasis: high
      note: >
        Collapse the README's three asks to one primary authorization: define and ratify a governed
        AI policy in a bounded, high-friction workflow (the 90-day pilot scope). Frame the labor
        audit and the pilot as implementation mechanics of that governance decision, not as
        separate asks. Lead with the asymmetric risk anchor: 99% of enterprise developers are
        already using AI tools (GitHub 2024) — the question is not whether AI is present but
        whether it is governed or unmonitored. The absence of a policy is not neutrality; it is
        unmonitored adoption at scale, without audit trail. Close with the 18–24 month head start
        that governed deployments hold — one sentence, no elaboration. Maximum 3 slides. The
        executive leaves with one action item: authorize the governance policy.

  # Preamble imports — exec-spine provides shared series context slide for all exec talks
  preamble:
    - src: "./exec-spine.md"

  # Optional appendix imports
  appendix: []

  # 4–5 high-signal moments the generator must surface in the deck.
  # Quantified, business-framed, no implementation detail.
  highlightMoments:
    - "AI-assisted teams produced 84% more successful builds and 15% higher PR merge rates — but code writing is only 30–33% of engineering labor, which is why those gains are not reaching the P&L (GitHub + Accenture 2024; McKinsey 2023)"
    - "Governance agents cut SQL injection remediation from 3.7 hours to 18 minutes (12x faster), while the average global data breach costs $4.44M before regulatory fines (GitHub Octoverse 2024; IBM 2025)"
    - "A 50-person engineering team spends 18,000+ engineer-hours annually on triage, coordination, and handoff work — the same analysis a developer spends 30 minutes on takes an agent under 5 seconds (Atlassian)"
    - "The Handoff Pattern compresses 8–12 hours of human labor per task to approximately 20 minutes of human decision time — the human review step is architecturally mandatory: only 43% of developers currently trust AI-generated output (Stack Overflow 2024)"
    - "Replacing one departing engineer costs 50–200% of annual salary; at 15% attrition on a 50-person team, that is 7–8 onboarding cycles per year — agent-driven documentation cuts ramp time from 6 weeks to 1–2 weeks (SHRM)"

# RESOLVED: The nine-category SDLC taxonomy grid DOES appear in Section 2.
# Use it as a three-bucket overlay — group all nine categories under Control / Coordination /
# Context. Do NOT expose all nine labels individually. The grid provides the visual anchor
# for "where the 67% lives." One cited dollar figure per bucket appears beneath or beside it.
