# VERDICT: The 4-section arc (Problem → Protocol → Connect → Trust) is structurally sound
# and requires no changes; S4's six slides form a single payoff movement whose momentum
# depends on continuity — splitting would produce a thin security stub and kill proof-point flow.

version: 1

deck:
  title: "GitHub Copilot ACP"
  subtitle: "The Agent Client Protocol"
  tagline: "Universal AI integration for any editor, tool, or workflow"
  arcToc: "The Problem → Protocol Architecture → Getting Started → Permissions & Security"
  arcNarrative: >
    The talk opens by diagnosing the N×M editor-agent integration matrix — every editor
    needs a custom plugin for every AI agent, a fragmentation crisis identical to the
    pre-LSP era. The protocol section resolves the technical "how" through a four-layer
    model (Transport → Protocol → Session → Application), closing with the ACP vs MCP vs
    LSP comparison table that defuses objections before the demo begins. Getting Started
    delivers the experiential peak: one flag starts the server, one SDK call streams a
    real response, and developers leave section three ready to open a terminal. Permissions
    & Security closes the arc by establishing production readiness — permission-mediated
    trust boundaries, three concrete use cases, and the ACP Agent Orchestrator as proof
    the protocol composes into real multi-agent systems.

  sectionOrder:
    - "The Problem"
    - "Protocol Architecture: Four Layers of Standardization"
    - "Getting Started: From Zero to Connected in 5 Minutes"
    - "Permissions & Security: Trust Without Blind Faith"

  sectionModes:
    "The Problem":
      emphasis: high
      note: >
        Land the N×M → N+M shift using the LSP analogy as the hook — this is the central
        cognitive unlock that makes ACP feel inevitable rather than optional for editor teams.
        The LSP Analogy is the mechanism; "The Problem" is the movement. Slide Part 1 header
        should read "The Problem" to match this canonical section name.
    "Protocol Architecture: Four Layers of Standardization":
      emphasis: medium
      note: >
        Walk the four-layer model (Transport → Protocol → Session → Application) and the
        message-flow diagram; close the section with the ACP vs MCP vs LSP comparison table —
        platform engineers arrive with "we already have MCP" objections and this table defuses
        them before the live demo begins. Full mental model before SDK code lands in S3.
    "Getting Started: From Zero to Connected in 5 Minutes":
      emphasis: high
      note: >
        The experiential peak — live startup of `copilot --acp --stdio` followed by a
        TypeScript client that streams a real response; if one slide makes the audience
        reach for their terminal, it is this section.
    "Permissions & Security: Trust Without Blind Faith":
      emphasis: medium-high
      note: >
        Six slides is the right count — Permission Model → Zed → CI/CD → Polyrepo →
        ACP Agent Orchestrator → SDK Ecosystem is a single cohesive movement, not two
        separate stories; splitting would produce a thin 2-slide security stub and break
        the proof-point momentum. Show the permission-callback pattern (interactive vs
        policy-based), anchor with the three concrete use cases, and close on the ACP
        Agent Orchestrator as proof the protocol composes into production multi-agent systems.

  highlightMoments:
    - "N×M integration chaos collapses to N+M via one protocol — exactly what LSP did for language servers"
    - "Live `copilot --acp --stdio` startup: the server is running before the next slide loads"
    - "First streaming response in the TypeScript SDK demo — agent output appears chunk by chunk in the terminal"
    - "Side-by-side permission strategies: interactive approval vs policy-based auto-approve for reads, block for deletes"
    - "ACP Agent Orchestrator: one broadcast prompt drives four worker agents across repos and synthesizes a cross-repo result"

# OPEN DECISION: none — S4 split is closed; S1 named "The Problem" per README heading (slides
# currently label Part 1 "The LSP Analogy" — update slide header to align with this recipe).
