# VERDICT: The gap spine (intent → geography → memory → scale) is the structural logic; each
# section closes one new dimension of distance between developer and working software. The
# previous structure dispersed the Memory gap across multiple sections without landing /chronicle
# as its own headline — this recipe corrects that. Section 2 cold-opens with the phone-steering
# demo (skeptic-first for CLI power users, not pedagogy-first). /chronicle headlines Section 3
# with compaction as its one-slide trust prologue. Section 4 closes as earned synthesis: agents
# carry the chronicle's learned preferences forward, completing the journey from individual Plan
# Mode user to AI system shaped by how your team actually works.

version: 1

deck:
  title: "GitHub Copilot CLI: AI at the Point of Work"
  subtitle: "Close Every Gap Between You and the Work"
  tagline: "Think anywhere. Steer anywhere. Learn always."

  arcToc: "Think Before You Build → Work From Anywhere → Sessions That Learn → Scale Beyond Yourself"

  arcNarrative: >
    S1 closes the Intent gap: what unlocks when AI follows you into the ~70% of your day
    outside the editor (Atlassian DevEx 2025) — that discovery frame makes Plan Mode feel
    necessary before delivering the visceral before/after — 8 attempts → 2, 45 min → 8 min
    — proving that asking the right questions before writing code is worth the pause. S2 closes the Geography gap with
    skeptic-first sequencing: the audience sees a phone steering an AI session on a
    production server for 60 seconds before any architecture explanation arrives, because
    CLI power users who distrust AI in the terminal need the payoff before they'll accept
    the mechanism; modes architecture and CI/CD pipeline integration follow as the "here's
    why that works" backfill. S3 closes the Memory gap and is the talk's most emotionally
    resonant section: session compaction builds foundational trust in one slide ("this
    session never forgets"), then /chronicle demonstrates what that persistence enables —
    standup reports, personalized usage tips, and proposed improvements to your own
    instructions; the emotional peak of the entire talk lands at S3's close — "AI that
    gets better the way you do — by working." S4 closes the Scale gap as earned synthesis:
    /fleet fan-out and agents carry the chronicle's learned preferences forward, completing
    the arc from one developer fixing a Docker container to an AI system shaped by how the
    whole team actually works.

  sectionOrder:
    - "Think Before You Build"
    - "Work From Anywhere"
    - "Sessions That Learn"
    - "Scale Beyond Yourself"

  sectionModes:
    "Think Before You Build":
      emphasis: high
      note: >
        Gap closed: Intent. Open with the discovery frame — what unlocks when AI follows
        you into the ~70% of your day outside the editor (Atlassian DevEx 2025:
        debugging, deployments, log analysis, CI triage). This frame makes every
        downstream capability feel necessary, not optional; land it before touching any
        feature. One live demo:
        Docker container debug with Plan Mode — 8 attempts → 2, 45 min → 8 min. The
        structured Q&A before implementation is the "senior engineer asks questions first"
        moment; let it breathe and let the contrast with naive code generation sink in
        before moving on. Close with a 4-operating-mode orientation slide so the audience
        arrives at S2 already knowing the mode vocabulary. Cut if tight: reasoning-model
        configuration slide (supports the demo but is not the demo). The "whoa" moment is
        the before/after debug collapse — make the failed-attempts count visible on screen.

    "Work From Anywhere":
      emphasis: high
      note: >
        Gap closed: Geography. COLD OPEN with the phone-steering demo — 60 seconds, no
        context, no preamble: audience watches a phone control an AI session running on a
        production server. Only after the reveal ask "how does that work?" and backfill the
        architecture (--remote flag, QR code / URL handoff, session-as-durable-entity
        model). This skeptic-first sequencing is the correct default for CLI power users
        who distrust AI in the terminal; if the speaker reads the room as predominantly
        existing Copilot users, modes-first is defensible but suboptimal. Follow with:
        modes architecture (Interactive / Plan / Programmatic / Remote), SSH + staging +
        production multi-machine patterns compressed into demo setup rather than standalone
        slides, then CI/CD pipeline integration as the section close (programmatic mode as
        the machine-side complement to human steering). The "whoa" moment is the phone-
        steering reveal — give it full breathing room before any explanation. The public
        preview date (2026-04-13) is a credibility anchor; call it out. Cut if tight:
        permission management slides (important for production safety but the Geography
        concept lands without them).

    "Sessions That Learn":
      emphasis: high
      note: >
        Gap closed: Memory. /chronicle HEADLINES this section — do NOT lead with
        compaction. Progression: (1) auto-compaction as one-slide trust prologue only —
        "the session never forgets, even across 95% token limits" — foundational trust-
        building, not a feature to demo; (2) introduce /context and /chronicle commands;
        (3) /chronicle standup demo — generate yesterday's standup from session history in
        30 seconds (everyday-value moment; audience immediately sees themselves using this);
        (4) /chronicle tips — AI surfaces personalized usage patterns from your own history;
        (5) /chronicle proposes improvements to .github/copilot-instructions.md — the
        section's climactic moment and the emotional peak of the entire talk. Pause here.
        Let the audience absorb "AI that gets better the way you do — by working" before
        transitioning. This is NOT the talk finale — S4 closes; the instruction-proposal
        moment is S3's close, not the talk's. Keep compaction to one slide maximum; the
        /chronicle arc is the section's center of gravity throughout.

    "Scale Beyond Yourself":
      emphasis: medium
      note: >
        Gap closed: Reach (scale). Open with the callback: agents carry the chronicle's
        learned preferences forward — the instruction improvements from S3 become the
        context that shapes every agent task in S4; name this connection explicitly so the
        arc lands. /fleet fan-out is the section's most architecturally novel capability:
        show explicit parallelization across subagents in separate context windows with
        results merged automatically (clearest visual of scale). Cloud delegation (&
        prefix) follows: delegate long-running work to GitHub's coding agent, both terminal
        and IDE stay completely free. Custom agents and plugins close as ecosystem reach.
        Talk close: "You started by asking better questions before writing code. You ended
        with an AI system shaped by how your team actually works." This section is
        synthesis, not appendix — keep it tight and let the S3 callback do the emotional
        work. Target ~4 content slides.

  preamble: []
  appendix:
    - src: ./copilot-cli-reference.md

  # 3-5 high-signal moments — ordered by section appearance
  highlightMoments:
    - "Docker debugging collapse: 8 attempts → 2, 45 min → 8 min with Plan Mode (S1 — visceral intent-gap before/after)"
    - "Phone-steering cold open: 60 seconds of a phone controlling a production server session before any explanation (S2 — skeptic reveal)"
    - "/chronicle standup: yesterday's standup generated from session history in 30 seconds (S3 — immediate everyday-value recognition)"
    - "/chronicle instruction proposals: AI proposes specific improvements to your own .github/copilot-instructions.md — pause, let it land (S3 — talk's emotional peak)"
    - "/fleet parallel execution: one task fans out across multiple subagents in separate context windows, results merge automatically (S4 — scale payoff)"

# DECISION: Section 2 opens with mobile-first (Path A). 60-second phone-steering demo
# with zero context, then "let me show you why that works" modes backfill.
